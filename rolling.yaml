apiVersion: apps/v1

kind: Deployment

metadata:
  name: student-portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student

  template:
    metadata:
      labels:
        app: student

    spec:
      containers:
      - name: student-app
        image: shreyascs88/myapp:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 3000